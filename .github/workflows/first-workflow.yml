name: Flask Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Secrets
        run: |
          echo "Username length: ${#DOCKERUSERNAME}"
          echo "Password length: ${#DOCKERPASSWORD}"
        env:
          DOCKERUSERNAME: ${{ secrets.DOCKERUSERNAME }}
          DOCKERPASSWORD: ${{ secrets.DOCKERPASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}flas-demo:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/flas-demo:latest
